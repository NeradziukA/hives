<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}} — hives docs</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; padding: 0; color: #ccc; background: #111; line-height: 1.6; }
  a { color: #7af; }
  h1, h2, h3 { color: #eee; }
  code { background: #222; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
  pre { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 16px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #333; padding: 8px 12px; text-align: left; }
  th { background: #1a1a1a; color: #eee; }

  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #161616;
    border-right: 1px solid #2a2a2a;
    padding: 24px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .docs-nav ul { list-style: none; margin: 0; padding: 0; }
  .docs-nav li { margin: 0; }
  .docs-nav li a {
    display: block;
    padding: 5px 20px;
    color: #aaa;
    text-decoration: none;
    font-size: 0.9em;
  }
  .docs-nav li a:hover { color: #eee; background: #1e1e1e; }
  .docs-nav li.active > a { color: #7af; font-weight: 600; }
  .docs-nav li.nav-section {
    padding: 12px 20px 4px;
    font-size: 0.75em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
  }

  main { flex: 1; padding: 40px 48px; max-width: 860px; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">{{nav}}</div>
  <main>{{body}}</main>
</div>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  document.querySelectorAll('pre code.language-mermaid').forEach(el => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.setAttribute('data-source', el.textContent);
    div.textContent = el.textContent;
    el.parentElement.replaceWith(div);
  });
  await mermaid.run();
  document.querySelectorAll('.mermaid').forEach(el => {
    const code = el.getAttribute('data-source') || '';
    if (!code) return;
    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify({ code, mermaid: { theme: 'dark' } }))));
    const link = document.createElement('a');
    link.href = 'https://mermaid.live/view#base64:' + b64;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = '↗ open in mermaid.live';
    link.style.cssText = 'display:block; margin-top:8px; font-size:0.85em;';
    el.after(link);
  });
</script>
</body>
</html>
